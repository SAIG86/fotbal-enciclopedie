<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Derby Live</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b14;
  color:#fff;
}

/* HEADER */
header{
  padding:10px;
  background:#111;
  position:sticky;
  top:0;
  border-bottom:2px solid red;
}

.teams{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}

.fcsb{background:linear-gradient(45deg,#d00,#06c);}
.dinamo{border:2px solid #c00;color:#c00;}

.active{outline:2px solid #fff;}

.tabs{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.tab{
  padding:8px 12px;
  background:#222;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

.tab.active{
  background:red;
}

#content{padding:12px;}

/* CARDS */
.card{
  background:#151525;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* LIVE SCORE */
.score{
  font-size:24px;
  font-weight:900;
  text-align:center;
}

/* ANIMAȚII */
.fade{
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.pulse{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* LISTE */
.player{
  background:#0f0f20;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}

.news{
  border-left:3px solid orange;
  padding-left:8px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<header>
  <div class="teams">
    <div class="btn fcsb active" onclick="switchTeam('FCSB')">FCSB</div>
    <div class="btn dinamo" onclick="switchTeam('DINAMO')">DINAMO</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('home',this)">Acasă</div>
    <div class="tab" onclick="switchTab('lot',this)">Lot</div>
    <div class="tab" onclick="switchTab('news',this)">Știri</div>
  </div>
</header>

<div id="content"></div>

<script>
let team="FCSB";
let tab="home";

/* ⚠️ PUNE API KEY */
const API_KEY="PUNE_API_KEY";

/* ID echipe (API-Football) */
const TEAM_ID={
  FCSB:487,
  DINAMO:496
};

/* DATE LOCALE (fallback) */
const DATA={
FCSB:{
  coach:"Elias Charalambous",
  stadium:"Arena Națională",
  lot:[
    "Târnovanu","Crețu","Dawa","Ngezana","Radunovic",
    "Olaru","Șut","Coman","Octavian Popescu",
    "Miculescu","Bîrligea"
  ],
  news:[
    "FCSB pregătește sezonul viitor",
    "Interes mare pentru Olaru",
    "Bîrligea în formă bună"
  ]
},
DINAMO:{
  coach:"Kopic",
  stadium:"Arcul de Triumf",
  lot:[
    "Golubovic","Boateng","Costin","Țicu",
    "Cîrjan","Politic","Ghezali",
    "Popa","Abdallah","Musi"
  ],
  news:[
    "Dinamo în luptă pentru Europa",
    "Club stabil financiar",
    "Tineri promovați"
  ]
}
};

/* 🔴 LIVE SCORE */
async function getLive(){
  try{
    let res=await fetch(`https://v3.football.api-sports.io/fixtures?team=${TEAM_ID[team]}&live=all`,{
      headers:{"x-apisports-key":API_KEY}
    });

    let data=await res.json();
    let m=data.response[0];

    if(!m){
      return "Nu joacă acum";
    }

    return `
      <div class="score pulse">
      ${m.teams.home.name} ${m.goals.home} - ${m.goals.away} ${m.teams.away.name}
      </div>
      <div style="text-align:center">Min ${m.fixture.status.elapsed}</div>
    `;
  }catch(e){
    return "Eroare live";
  }
}

/* RENDER */
async function render(){
  let d=DATA[team];
  let html="";

  if(tab==="home"){
    let live=await getLive();

    html+=`
    <div class="card fade">
      <h2>${team}</h2>
      <p>Antrenor: ${d.coach}</p>
      <p>Stadion: ${d.stadium}</p>
    </div>

    <div class="card fade">
      <h3>Scor LIVE</h3>
      ${live}
    </div>

    <div class="card fade">
      <h3>H2H</h3>
      <p>FCSB 72 - 57 - 62 Dinamo</p>
    </div>
    `;
  }

  if(tab==="lot"){
    html+=`<div class="card fade"><h3>Lot</h3>`;
    d.lot.forEach(p=>{
      html+=`<div class="player">${p}</div>`;
    });
    html+=`</div>`;
  }

  if(tab==="news"){
    html+=`<div class="card fade"><h3>Știri</h3>`;
    d.news.forEach(n=>{
      html+=`<div class="news">${n}</div>`;
    });
    html+=`</div>`;
  }

  document.getElementById("content").innerHTML=html;
}

/* SWITCH TEAM */
function switchTeam(t){
  team=t;

  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".btn")[t==="FCSB"?0:1].classList.add("active");

  render();
}

/* SWITCH TAB */
function switchTab(t,el){
  tab=t;

  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  render();
}

/* AUTO REFRESH LIVE */
setInterval(render,15000);

render();
</script>

</body>
</html>

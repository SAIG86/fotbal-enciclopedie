<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin:0;
  background:#05070f;
  color:white;
  font-family:system-ui;
}
.glass{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  border-radius:16px;
}
</style>
</head>

<body>

<div class="p-4 grid md:grid-cols-3 gap-4">

  <div class="glass p-4">
    <h2 id="clock"></h2>
    <p id="date"></p>
  </div>

  <div class="glass p-4">
    <h2>Vreme</h2>
    <p id="weather">Loading...</p>
  </div>

  <div class="glass p-4">
    <h2>Task-uri</h2>
    <input id="taskInput" class="text-black px-2 py-1">
    <button onclick="addTask()">Add</button>
    <div id="tasks"></div>
  </div>

  <div class="glass p-4">
    <h2>Știri</h2>
    <div id="news"></div>
  </div>

  <div class="glass p-4">
    <h2>Fotbal</h2>
    <div id="football"></div>
  </div>

  <div class="glass p-4">
    <h2>Citat</h2>
    <p id="quote"></p>
  </div>

</div>

<script>

// CLOCK
function updateClock(){
  const now=new Date();
  document.getElementById("clock").innerText=now.toLocaleTimeString();
  document.getElementById("date").innerText=now.toLocaleDateString("ro-RO");
}
setInterval(updateClock,1000);
updateClock();

// WEATHER
fetch("https://wttr.in/44.43,26.10?format=j1")
.then(r=>r.json())
.then(d=>{
  document.getElementById("weather").innerText=d.current_condition[0].temp_C+"°C";
});

// TASKS
let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
function renderTasks(){
  const el=document.getElementById("tasks");
  el.innerHTML="";
  tasks.forEach((t,i)=>{
    const p=document.createElement("p");
    p.innerText=t;
    p.onclick=()=>{tasks.splice(i,1);save();};
    el.appendChild(p);
  });
}
function save(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  renderTasks();
}
function addTask(){
  const v=document.getElementById("taskInput").value;
  if(!v)return;
  tasks.push(v);
  document.getElementById("taskInput").value="";
  save();
}
renderTasks();

// NEWS
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.digi24.ro/rss")
.then(r=>r.json())
.then(d=>{
  const el=document.getElementById("news");
  d.items.slice(0,5).forEach(n=>{
    const p=document.createElement("p");
    p.innerText=n.title;
    el.appendChild(p);
  });
});

// FOOTBALL
fetch("https://www.thesportsdb.com/api/v1/json/3/livescore.php")
.then(r=>r.json())
.then(d=>{
  const el=document.getElementById("football");
  (d.events||[]).slice(0,5).forEach(m=>{
    const p=document.createElement("p");
    p.innerText=m.strHomeTeam+" vs "+m.strAwayTeam;
    el.appendChild(p);
  });
});

// QUOTE
const quotes=[
"Fii tu însuți",
"Nu renunța",
"Muncește zilnic"
];
document.getElementById("quote").innerText=
quotes[new Date().getDate()%quotes.length];

</script>

</body>
</html>

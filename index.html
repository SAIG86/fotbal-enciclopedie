<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enciclopedie Eternul Derby PRO</title>
    <style>
        :root { --main: #DA2928; --sec: #0046AE; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        /* Stiluri Dinamice */
        .theme-fcsb { --main: #DA2928; --sec: #0046AE; }
        .theme-dinamo { --main: #D00000; --sec: #ffffff; }

        #nav { position: sticky; top: 0; z-index: 1000; background: #000; padding: 10px; border-bottom: 3px solid var(--main); transition: 0.5s; }
        .flex { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-e { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        
        .fcsb-btn { background: linear-gradient(45deg, #DA2928, #0046AE); color: #fff; }
        .dinamo-btn { background: #fff; color: #D00000; border: 2px solid #D00000; }
        .active { outline: 3px solid #fff; transform: scale(1.03); box-shadow: 0 0 20px var(--main); }

        #tabs { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; scrollbar-width: none; }
        #tabs::-webkit-scrollbar { display: none; }
        .tab { white-space: nowrap; padding: 10px 20px; border-radius: 20px; background: #1a1a1a; color: #888; border: 1px solid #333; font-weight: bold; font-size: 13px; }
        .tab.active-tab { background: var(--main); color: #fff; border-color: #fff; }

        #content { padding: 15px; }
        .card { background: #111; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--main); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .img-box { width: 100%; border-radius: 10px; margin: 10px 0; border: 1px solid #333; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; margin-bottom: 15px; }
        .video-container iframe { position: absolute; top:0; left: 0; width: 100%; height: 100%; }

        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .score { font-weight: 900; color: var(--main); }
        .news-tag { color: var(--main); font-weight: bold; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body class="theme-fcsb">

<div id="nav">
    <div class="flex">
        <button id="f-btn" class="btn-e fcsb-btn active">FCSB</button>
        <button id="d-btn" class="btn-e dinamo-btn">Dinamo</button>
    </div>
    <div id="tabs">
        <button class="tab active-tab" data-t="media">Media & Foto</button>
        <button class="tab" data-t="news">Știri 16 Apr 2026</button>
        <button class="tab" data-t="bilant">Bilanț (189 meciuri)</button>
        <button class="tab" data-t="lot">Lot Jucători</button>
    </div>
</div>

<div id="content"></div>

<script>
const db = {
    "FCSB": {
        color: "#DA2928",
        news: [
            { t: "Arena Națională se scumpește", d: "Primăria a anunțat chirii mai mari pentru FCSB și Dinamo de azi, 16 aprilie." },
            { t: "Daniel Bîrligea, monitorizat de Lille", d: "Atacantul este în formă maximă înainte de finalul sezonului." }
        ],
        lot: ["Șt. Târnovanu", "R. Udrea", "S. Ngezana", "J. Dawa", "D. Olaru (C)", "A. Șut", "D. Bîrligea", "F. Tănase"],
        bilant: { v: 68, e: 60, i: 61, goluri: "273 - 254" },
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/FCSB_Logo.svg/1200px-FCSB_Logo.svg.png"
    },
    "Dinamo": {
        color: "#D00000",
        news: [
            { t: "Valentin Țicu, debut solid", d: "Noul fundaș stânga s-a integrat rapid în sistemul lui Kopic." },
            { t: "Planuri pentru noul stadion", d: "Au apărut noi randări cu arena din Ștefan cel Mare." }
        ],
        lot: ["A. Golubovic", "A. Roșca", "K. Boateng", "V. Țicu (Transfer 2026)", "C. Cîrjan", "D. Politic (C)", "A. Selmani"],
        bilant: { v: 61, e: 60, i: 68, goluri: "254 - 273" },
        img: "https://upload.wikimedia.org/wikipedia/ro/thumb/9/90/FC_Dinamo_Bucuresti_logo.svg/1200px-FC_Dinamo_Bucuresti_logo.svg.png"
    }
};

const istoric = [
    { d: "06 Dec 2025", s: "FCSB 0 - 0 Dinamo", c: "Liga 1", m: "Meci echilibrat pe Arena Națională" },
    { d: "20 Oct 2024", s: "Dinamo 0 - 2 FCSB", c: "Liga 1", m: "Bîrligea '26, Musi '90+3" },
    { d: "10 Mai 1997", s: "Steaua 5 - 0 Dinamo", c: "Divizia A", m: "Militaru, Ciocoiu (2), Șerban, Baciu" },
    { d: "11 Apr 1982", s: "Dinamo 1 - 1 Steaua", c: "Divizia A", m: "Dudu Georgescu / Septimiu Câmpeanu" },
    { d: "21 Noi 1948", s: "CSCA 0 - 1 Dinamo", c: "Primul Derby", m: "Marin Apostol '42" }
];

let curE = "FCSB";
let curT = "media";

function render() {
    const info = db[curE];
    const content = document.getElementById("content");
    document.body.className = "theme-" + curE.toLowerCase();
    
    document.getElementById("f-btn").className = "btn-e fcsb-btn" + (curE === "FCSB" ? " active" : "");
    document.getElementById("d-btn").className = "btn-e dinamo-btn" + (curE === "Dinamo" ? " active" : "");

    let html = "";
    if (curT === "media") {
        html = `<h2>📸 Media & Video</h2>
                <div class="video-container"><iframe src="https://www.youtube.com/embed/ZHRxGddwvlU" frameborder="0" allowfullscreen></iframe></div>
                <div class="card"><img src="${info.img}" class="img-box"><p align="center">Sigla oficială ${curE}</p></div>
                <div class="card"><img src="https://img.api-news.com.br/foto-1-dinamo-fcsb-partida-care-conteaza-pentru-etapa-a-4-a-a-sezonului-de-liga-1-poate-fi-urmarita-in-format-live-text-pe-as-ro.jpg" class="img-box"><p align="center">Atmosferă de Derby pe Arena Națională</p></div>`;
    } 
    else if (curT === "news") {
        html = `<h2>📰 Știri Proaspete - 16 Aprilie 2026</h2>`;
        info.news.forEach(n => {
            html += `<div class="card"><span class="news-tag">ACUM</span><h3>${n.t}</h3><p>${n.d}</p></div>`;
        });
    }
    else if (curT === "bilant") {
        html = `<h2>⚔️ Bilanț Istoric (1948-2026)</h2>
                <div class="card"><div class="stat-row"><span>Meciuri Totale</span><b>189</b></div><div class="stat-row"><span>Victorii ${curE}</span><b>${info.bilant.v}</b></div><div class="stat-row"><span>Egaluri</span><b>60</b></div></div>
                <h3>Rezultate Memorabile:</h3>`;
        istoric.forEach(m => {
            html += `<div class="card"><div class="stat-row"><span>${m.d}</span><span class="score">${m.s}</span></div><div style="font-size:12px; color:#aaa;">${m.c} | ${m.m}</div></div>`;
        });
    }
    else if (curT === "lot") {
        html = `<h2>🏃 Lot Actualizat (Fără A. Vlad)</h2><div class="card">`;
        info.lot.forEach(j => html += `<div class="stat-row"><span>⚽ ${j}</span></div>`);
        html += `</div>`;
    }

    content.innerHTML = html;
}

document.getElementById("f-btn").onclick = () => { curE = "FCSB"; render(); };
document.getElementById("d-btn").onclick = () => { curE = "Dinamo"; render(); };

document.querySelectorAll(".tab").forEach(t => {
    t.onclick = (e) => {
        document.querySelectorAll(".tab").forEach(x => x.classList.remove("active-tab"));
        e.target.classList.add("active-tab");
        curT = e.target.dataset.t;
        render();
    };
});

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enciclopedie Fotbal - S25 Ultra Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Sidebar/Meniu Echipe */
        #sidebar { background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px; border-bottom: 2px solid #333; gap: 10px; }
        .team-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .fcsb-btn { background: linear-gradient(45deg, #DA2928, #0046AE); color: white; }
        .dinamo-btn { background: linear-gradient(45deg, #D00000, #FFFFFF); color: black; }
        .team-btn.active { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.4); border: 2px solid white; }

        /* Zona principala */
        #main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; transition: 0.5s; }
        .theme-fcsb { background: linear-gradient(180deg, #001a3d 0%, #000 100%); }
        .theme-dinamo { background: linear-gradient(180deg, #3d0000 0%, #000 100%); }

        #header { padding: 20px; text-align: center; }
        #teamName { font-size: 28px; font-weight: 900; letter-spacing: 1px; }
        #tagline { font-size: 14px; color: #aaa; margin-top: 5px; }

        /* Meniu Tab-uri */
        #tabs { display: flex; overflow-x: auto; gap: 10px; padding: 10px 15px; background: rgba(0,0,0,0.5); position: sticky; top: 0; }
        .tab-btn { white-space: nowrap; padding: 10px 20px; border-radius: 20px; border: 1px solid #444; background: #222; color: #ccc; font-weight: 600; font-size: 13px; }
        .tab-btn.active { background: #fff; color: #000; border-color: #fff; }

        /* Continut */
        #content { padding: 20px; padding-bottom: 50px; line-height: 1.6; }
        .section-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 20px; border-left: 4px solid #fff; }
        .theme-dinamo .section-card { border-left-color: #D00000; }
        .theme-fcsb .section-card { border-left-color: #0046AE; }

        h2 { font-size: 20px; margin-top: 0; color: #fff; }
        p { font-size: 15px; color: #ddd; }
        ul { padding-left: 20px; }
        li { margin-bottom: 8px; }
        .match-live { text-align: center; padding: 20px; border: 1px dashed #555; border-radius: 15px; margin-top: 10px; }
    </style>
</head>
<body class="theme-fcsb">

<div id="sidebar">
    <button class="team-btn fcsb-btn active" data-team="FCSB">FCSB</button>
    <button class="team-btn dinamo-btn" data-team="Dinamo">DINAMO</button>
</div>

<div id="main">
    <div id="header">
        <div id="teamName">FCSB</div>
        <div id="tagline">Spiritul de luptă roș-albastru</div>
    </div>

    <div id="tabs">
        <button class="tab-btn active" data-tab="info">Istorie</button>
        <button class="tab-btn" data-tab="trophies">Palmares</button>
        <button class="tab-btn" data-tab="legends">Legende</button>
        <button class="tab-btn" data-tab="live">Meci Live</button>
    </div>

    <div id="content"></div>
</div>

<script>
const data = {
    "FCSB": {
        name: "FCSB (Steaua)",
        tagline: "Cea mai titrată echipă din România",
        history: "Înființat în 1947 sub numele de ASA București, clubul a devenit rapid forța dominantă a fotbalului românesc. Momentul de aur a fost 7 Mai 1986, când a câștigat Cupa Campionilor Europeni la Sevilla, apărând eroic în fața Barcelonei. Helmuth Duckadam a apărat atunci 4 penalty-uri, un record mondial.",
        trophies: ["27 Titluri de Campioană", "24 Cupe ale României", "Cupa Campionilor Europeni (1986)", "Supercupa Europei (1986)"],
        legends: ["Gheorghe Hagi", "Marius Lăcătuș", "Helmuth Duckadam", "Anghel Iordănescu"]
    },
    "Dinamo": {
        name: "Dinamo București",
        tagline: "Câinii Roșii din Ștefan cel Mare",
        history: "Înființat în 1948, Dinamo a fost prima echipă din România care a ajuns în semifinalele Cupei Campionilor Europeni (1984). Cunoscută pentru stilul ofensiv și suporterii fanatici, echipa a dominat decenii la rând fotbalul intern alături de marea rivală.",
        trophies: ["18 Titluri de Campioană", "13 Cupe ale României", "Semifinală CCE (1984)", "Semifinală Cupa Cupelor (1990)"],
        legends: ["Floreat Dumitrache", "Cornel Dinu", "Dudu Georgescu (Gheata de Aur)", "Cătălin Hîldan"]
    }
};

let currentTeam = "FCSB";
let currentTab = "info";

function render() {
    const team = data[currentTeam];
    const content = document.getElementById("content");
    const main = document.getElementById("main");
    
    document.getElementById("teamName").textContent = team.name;
    document.getElementById("tagline").textContent = team.tagline;
    main.className = currentTeam === "FCSB" ? "theme-fcsb" : "theme-dinamo";

    if (currentTab === "info") {
        content.innerHTML = `<div class="section-card"><h2>Istoria Clubului</h2><p>${team.history}</p></div>`;
    } else if (currentTab === "trophies") {
        content.innerHTML = `<div class="section-card"><h2>Trofee și Performanțe</h2><ul>${team.trophies.map(t => `<li>${t}</li>`).join('')}</ul></div>`;
    } else if (currentTab === "legends") {
        content.innerHTML = `<div class="section-card"><h2>Legende Nemuritoare</h2><ul>${team.legends.map(l => `<li>${l}</li>`).join('')}</ul></div>`;
    } else if (currentTab === "live") {
        content.innerHTML = `<div class="match-live"><h2>Fără meciuri live</h2><p>Momentan nu se dispută nicio partidă oficială.</p><p style="font-size:12px; color:#666;">Verifică programul etapei următoare.</p></div>`;
    }
}

document.querySelectorAll(".team-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".team-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTeam = btn.dataset.team;
        render();
    };
});

document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTab = btn.dataset.tab;
        render();
    };
});

render();
</script>
</body>
</html>

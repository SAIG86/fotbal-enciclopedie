<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ Eternul Derby — FCSB vs Dinamo</title>
<style>
  :root {
    --bg: #080810;
    --card: #0f0f1a;
    --border: #1e1e30;
    --text: #e8e8f0;
    --sub: #888;
    --fcsb-red: #DA2928;
    --fcsb-blue: #0046AE;
    --dinamo-red: #C8001A;
    --gold: #FFD700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

  /* ───── HEADER ───── */
  #header {
    background: linear-gradient(180deg, #0a0a18 0%, #080810 100%);
    padding: 14px 12px 0;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 2px solid var(--active-color, #DA2928);
    transition: border-color .4s;
  }
  .team-switcher { display: flex; gap: 8px; margin-bottom: 12px; }
  .team-btn {
    flex: 1; padding: 13px 6px; border-radius: 12px; border: 2px solid transparent;
    font-weight: 900; font-size: 15px; cursor: pointer; letter-spacing: .5px;
    text-transform: uppercase; transition: all .3s;
  }
  .fcsb-btn { background: linear-gradient(135deg, #DA2928 0%, #0046AE 100%); color: #fff; }
  .dinamo-btn { background: transparent; color: #C8001A; border-color: #C8001A; }
  .fcsb-btn.active { box-shadow: 0 0 20px rgba(218,41,40,.5); transform: scale(1.03); outline: 2px solid #fff; }
  .dinamo-btn.active { background: #C8001A; color: #fff; box-shadow: 0 0 20px rgba(200,0,26,.5); transform: scale(1.03); outline: 2px solid #fff; }

  #tabs { display: flex; overflow-x: auto; gap: 6px; padding-bottom: 10px; scrollbar-width: none; }
  #tabs::-webkit-scrollbar { display: none; }
  .tab {
    white-space: nowrap; padding: 9px 16px; border-radius: 20px;
    background: #151525; color: #666; border: 1px solid #222;
    font-weight: 700; font-size: 12px; cursor: pointer; transition: all .25s;
  }
  .tab.on { color: #fff; border-color: transparent; }

  /* ───── CONTENT ───── */
  #content { padding: 14px; }

  /* ───── CARDS ───── */
  .card {
    background: var(--card); border-radius: 14px; padding: 15px;
    margin-bottom: 14px; border: 1px solid var(--border);
  }
  .card-title { font-size: 13px; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .section-title { font-size: 18px; font-weight: 900; margin-bottom: 14px; }

  /* ───── BADGE BANNER ───── */
  .season-banner {
    border-radius: 14px; padding: 14px 16px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .banner-icon { font-size: 32px; }
  .banner-text { font-size: 13px; line-height: 1.5; }
  .banner-text strong { font-size: 15px; display: block; }

  /* ───── STAT ROW ───── */
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-badge { font-weight: 900; font-size: 15px; background: #1a1a2e; padding: 4px 10px; border-radius: 8px; }

  /* ───── H2H SCOREBOARD ───── */
  .h2h-box {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 8px; text-align: center; padding: 14px 0;
  }
  .h2h-score { font-size: 40px; font-weight: 900; }
  .h2h-label { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: .8px; margin-top: 4px; }
  .h2h-sep { font-size: 24px; color: var(--sub); }

  /* ───── PROGRESS BAR ───── */
  .bar-wrap { height: 10px; background: #1a1a2e; border-radius: 5px; overflow: hidden; margin: 8px 0; }
  .bar-fill { height: 100%; border-radius: 5px; transition: width 1s; }

  /* ───── MATCH CARD ───── */
  .match-card {
    background: #0d0d1e; border-radius: 12px; padding: 12px 14px;
    margin-bottom: 10px; border-left: 3px solid;
  }
  .match-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .match-competition { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .8px; }
  .match-date { font-size: 11px; color: var(--sub); }
  .match-score { font-size: 16px; font-weight: 900; text-align: center; margin: 6px 0; }
  .match-note { font-size: 11px; color: #777; }

  /* ───── RECORD CARD ───── */
  .record-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .record-emoji { font-size: 24px; flex-shrink: 0; }
  .record-text { flex: 1; }
  .record-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
  .record-val { font-size: 12px; color: var(--sub); }

  /* ───── PLAYER CARD ───── */
  .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .player-card {
    background: #0d0d1e; border-radius: 10px; padding: 10px 12px;
    border-left: 3px solid;
  }
  .player-pos { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; }
  .player-name { font-size: 13px; font-weight: 700; margin-top: 3px; }
  .player-detail { font-size: 11px; color: var(--sub); margin-top: 2px; }

  /* ───── TIMELINE ───── */
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .tl-item { position: relative; margin-bottom: 16px; }
  .tl-dot { position: absolute; left: -16px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--active-color, #DA2928); border: 2px solid var(--bg); }
  .tl-year { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .8px; }
  .tl-score { font-size: 15px; font-weight: 900; margin: 2px 0; }
  .tl-detail { font-size: 11px; color: var(--sub); }

  /* ───── NEWS ───── */
  .news-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
  .news-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.35; }
  .news-body { font-size: 13px; color: #aaa; line-height: 1.5; }

  /* ───── PALMAROS ───── */
  .palmares-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .palmares-count { font-size: 24px; font-weight: 900; min-width: 36px; }
  .palmares-comp { font-size: 13px; font-weight: 700; }
  .palmares-sub { font-size: 11px; color: var(--sub); }

  /* ───── ALERT BOX ───── */
  .alert { border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; border: 1px solid; }
  .alert-warning { background: rgba(255,160,0,.08); border-color: rgba(255,160,0,.3); }
  .alert-info { background: rgba(0,100,255,.08); border-color: rgba(0,100,255,.3); }
  .alert-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .alert-text { font-size: 12px; color: var(--sub); line-height: 1.5; }
</style>
</head>

<div id="header">

function pct(v, total) { return Math.round(v / total * 100); }

function matchBorder(w) {
  if (w === "F") return DATA.FCSB.color;
  if (w === "D") return DATA.Dinamo.color;

  <div class="season-banner" style="background:${d.sezon.statusColor}15; border:1px solid ${d.sezon.statusColor}44;">
    <div class="banner-icon">${d.sezon.statusIcon}</div>
    <div class="banner-text">
      <strong style="color:${d.sezon.statusColor}">${d.sezon.status}</strong>
      ${d.sezon.pozitie}
    </div>
  </div>

  <div class="alert alert-warning">
    <div class="alert-title">ℹ️ Context sezon</div>
    <div class="alert-text">${d.sezon.nota}</div>
  </div>

  <div class="alert alert-info">
    <div class="alert-title">🇪🇺 Europa</div>
    <div class="alert-text">${d.sezon.europa}</div>
  </div>

  <div class="card">
    <div class="card-title">📅 Meciuri recente</div>
    ${d.sezon.meciuriRecente.map(m => `
      <div class="stat-row">
        <div>
          <div style="font-size:13px;font-weight:700;">${m.adv}</div>
          <div style="font-size:11px;color:var(--sub);">${m.data} · ${m.comp}</div>
        </div>
        <div class="stat-badge" style="background:${
          m.rez.includes('câștigat') ? d.color+'33' : 
          m.rez.includes('pierdut') ? '#ff000033' : '#33333355'
        }; color:${
          m.rez.includes('câștigat') ? d.color : 
          m.rez.includes('pierdut') ? '#ff6666' : '#888'
        };">${m.rez.split(' ')[0]}</div>
      </div>
    `).join('')}
  </div>

  ${E === 'FCSB' ? `
  <div class="card">
    <div class="card-title">🏆 Play-Out 2025-26 (start)</div>
    ${[
      {e:'FCSB', p:23}, {e:'UTA Arad', p:22}, {e:'Botoșani', p:21},
      {e:'Oțelul', p:21}, {e:'Farul', p:19}, {e:'Petrolul', p:16},
      {e:'Csikszereda', p:16}, {e:'Slobozia', p:13}, {e:'Hermannstadt', p:12}, {e:'Metaloglobus', p:6}
    ].map((r,i) => `
      <div class="stat-row" style="${r.e==='FCSB'?'background:'+DATA.FCSB.color+'11;border-radius:8px;padding:10px 8px;':''}">
        <span style="font-size:14px;${r.e==='FCSB'?'font-weight:900;color:'+DATA.FCSB.color:''}">${i+7}. ${r.e}</span>
        <span class="stat-badge">${r.p} pct</span>
      </div>
    `).join('')}
  </div>
  ` : `
  <div class="card">
    <div class="card-title">🏆 Play-Off 2025-26 (start)</div>
    ${[
      {e:'U Craiova', p:30}, {e:'Rapid', p:28}, {e:'U Cluj', p:27},
      {e:'CFR Cluj', p:27}, {e:'Dinamo', p:26}, {e:'FC Argeș', p:25}
    ].map((r,i) => `
      <div class="stat-row" style="${r.e==='Dinamo'?'background:'+DATA.Dinamo.color+'11;border-radius:8px;padding:10px 8px;':''}">
        <span style="font-size:14px;${r.e==='Dinamo'?'font-weight:900;color:'+DATA.Dinamo.color:''}">${i+1}. ${r.e}</span>
        <span class="stat-badge">${r.p} pct</span>
      </div>
    `).join('')}
  </div>
  `}`;
}

function renderBilant() {
  return `
  <div class="section-title">⚔️ Bilanț Complet H2H</div>
  <div class="card">
    <div class="card-title">📊 Statistici generale (1948 – Apr 2026)</div>
    <div class="h2h-box" style="padding:16px 0;">
      <div>
        <div class="h2h-score" style="color:${DATA.FCSB.color}">${H2H.wFCSB}</div>
        <div class="h2h-label">Victorii FCSB</div>
      </div>
      <div>
        <div class="h2h-score" style="color:#555">${H2H.draws}</div>
        <div class="h2h-label">Egaluri</div>
      </div>
      <div>
        <div class="h2h-score" style="color:${DATA.Dinamo.color}">${H2H.wDinamo}</div>
        <div class="h2h-label">Victorii Dinamo</div>
      </div>
    </div>
    <div class="bar-wrap" style="height:14px;">
      <div style="display:flex;height:100%;">
        <div style="width:${pct(H2H.wFCSB,H2H.total)}%;background:${DATA.FCSB.color}"></div>
        <div style="width:${pct(H2H.draws,H2H.total)}%;background:#333"></div>
        <div style="width:${pct(H2H.wDinamo,H2H.total)}%;background:${DATA.Dinamo.color}"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-top:6px;">
      <span style="color:${DATA.FCSB.color};font-weight:700;">FCSB ${pct(H2H.wFCSB,H2H.total)}%</span>
      <span>${H2H.total} meciuri</span>
      <span style="color:${DATA.Dinamo.color};font-weight:700;">${pct(H2H.wDinamo,H2H.total)}% Dinamo</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📅 Cronologie derby-uri</div>
    <div class="timeline">
      ${MECIURI_ISTORICE.map(m => `
        <div class="tl-item">
          <div class="tl-dot" style="background:${matchBorder(m.w)}"></div>
          <div class="tl-year">${m.d} · ${m.c}</div>
          <div class="tl-score">${m.s}</div>
          <div class="tl-detail">${m.m}</div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function renderLot(E) {
  const d = DATA[E];
  const poz = ['PO','FD','MJ','AT'];
  const pozLabel = {PO:'Portari',FD:'Fundași',MJ:'Mijlocași',AT:'Atacanți'};
  let html = `<div class="section-title">👥 Lot ${d.name} — 2025/26</div>`;

  poz.forEach(p => {
    const juc = d.lot.filter(j => j.poz === p);
    if (!juc.length) return;
    html += `<div style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px;">${pozLabel[p]}</div>`;
    html += `<div class="player-grid">`;
    juc.forEach(j => {
      html += `
        <div class="player-card" style="border-color:${d.color}">
          <div class="player-pos">${p}</div>
          <div class="player-name">${j.name}</div>
          <div class="player-detail">${j.det}</div>
        </div>`;
    });
    html += `</div>`;
  });
  return html;
}

function renderRecorduri() {
  return `
  <div class="section-title">🏆 Recorduri & Statistici Derby</div>
  <div class="card">
    ${RECORDURI.map(r => `
      <div class="record-item">
        <div class="record-emoji">${r.icon}</div>
        <div class="record-text">
          <div class="record-title">${r.title}</div>
          <div class="record-val">${r.val}</div>
        </div>
      </div>
    `).join('')}
  </div>`;
}

function renderPalmares(E) {
  const d = DATA[E];
  return `
  <div class="section-title">🎖️ Palmaroș ${d.name}</div>
  <div class="card">
    ${d.palmares.map(p => `
      <div class="palmares-row">
        <div class="palmares-count" style="color:${d.color}">${p.n > 0 ? p.n : '—'}</div>
        <div>
          <div class="palmares-comp">${p.icon} ${p.comp}</div>
        </div>
      </div>
    `).join('')}
  </div>
  ${E === 'FCSB' ? `
  <div class="card" style="border:1px solid ${DATA.FCSB.color}44;">
    <div style="font-size:13px;line-height:1.7;color:var(--sub);">
      FCSB este <strong style="color:${DATA.FCSB.color}">singura echipă din România</strong> care a câștigat trofee europene continentale — Cupa Campionilor Europeni (1986) și Supercupa Europei (1986).
    </div>
  </div>` : `
  <div class="card" style="border:1px solid ${DATA.Dinamo.color}44;">
    <div style="font-size:13px;line-height:1.7;color:var(--sub);">
      Dinamo a atins <strong style="color:${DATA.Dinamo.color}">semifinalele Cupei Campionilor</strong> în 1984 și semifinalele Cupei Cupelor în 1990.
    </div>
  </div>`}`;
}

function render() {
  const d = DATA[curE];
  document.documentElement.style.setProperty('--active-color', d.color);

  document.querySelectorAll('.tab').forEach(t => {
    t.style.background = t.dataset.t === curT ? d.color : '#151525';
    t.style.color = t.dataset.t === curT ? '#fff' : '#666';
    t.classList.toggle('on', t.dataset.t === curT);
  });

  document.getElementById('f-btn').className = 'team-btn fcsb-btn' + (curE === 'FCSB' ? ' active' : '');
  document.getElementById('d-btn').className = 'team-btn dinamo-btn' + (curE === 'Dinamo' ? ' active' : '');

  let html = '';
  if (curT === 'acasa')     html = renderAcasa(curE);
  if (curT === 'sezon')     html = renderSezon(curE);
  if (curT === 'bilant')    html = renderBilant();
  if (curT === 'lot')       html = renderLot(curE);
  if (curT === 'recorduri') html = renderRecorduri();
  if (curT === 'palmaros')  html = renderPalmares(curE);

  document.getElementById('content').innerHTML = html;
  window.scrollTo(0, 0);
}

document.getElementById('f-btn').onclick = () => { curE = 'FCSB'; render(); };
document.getElementById('d-btn').onclick = () => { curE = 'Dinamo'; render(); };
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = (e) => { curT = e.currentTarget.dataset.t; render(); };
});

render();
</script>
</body>
</html>

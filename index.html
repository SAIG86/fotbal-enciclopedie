<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dashboard S25 Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --negru: #050505; --rosu: #CE1126; --galben: #FCD116; --albastru: #002B7F; }
        body { background: var(--negru); color: white; font-family: 'Outfit', sans-serif; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #121212; border: 1px solid #222; border-radius: 24px; padding: 20px; position: relative; overflow: hidden; }
        .accent-b { border-top: 4px solid var(--albastru); }
        .accent-r { border-top: 4px solid var(--rosu); }
        .accent-g { border-top: 4px solid var(--galben); }
        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: #555; margin-bottom: 15px; }
        #ceas { font-size: 5rem; font-weight: 600; color: var(--galben); line-height: 1; }
        #data { color: var(--albastru); font-size: 1.1rem; margin-bottom: 20px; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 80%; margin-bottom: 10px; }
        button { background: var(--albastru); border: none; color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .match, .news { border-bottom: 1px solid #222; padding: 10px 0; font-size: 0.9rem; }
        .live { color: var(--rosu); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="ceas">00:00</div>
    <div id="data">Încarcare...</div>

    <div class="grid">
        <div class="card accent-b">
            <h2>Vremea Pantelimon</h2>
            <a class="weatherwidget-io" href="https://forecast7.com/ro/44a4526a21/pantelimon/" data-label_1="PANTELIMON" data-theme="pure" data-basecolor="#121212" data-accent="var(--galben)" data-textcolor="#ffffff" >Vremea Pantelimon</a>
        </div>

        <div class="card accent-r">
            <h2>Fotbal Live</h2>
            <div id="scores">
                <div class="match">Liga 1: FCSB - Rapid <span class="live">LIVE (1-1)</span></div>
                <div class="match">Premier League: Man. City - Arsenal (22:00)</div>
                <div class="match">La Liga: Real Madrid - Barca (Final 3-2)</div>
            </div>
        </div>

        <div class="card accent-g">
            <h2>Știri România</h2>
            <div id="news-list">
                <div class="news">Se încarcă cele mai noi știri de pe Digi24...</div>
            </div>
        </div>

        <div class="card">
            <h2>Task-uri</h2>
            <input type="text" id="tIn" placeholder="Adaugă task...">
            <button onclick="addT()">+</button>
            <div id="tList"></div>
        </div>
    </div>

    <script>
        function update() {
            const n = new Date();
            document.getElementById('ceas').innerText = n.toLocaleTimeString('ro-RO', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('data').innerText = n.toLocaleDateString('ro-RO', {weekday:'long', day:'numeric', month:'long'});
        }
        setInterval(update, 1000); update();

        function addT() {
            const i = document.getElementById('tIn');
            if(!i.value) return;
            const d = document.createElement('div');
            d.className = 'news';
            d.innerHTML = `• ${i.value}`;
            document.getElementById('tList').appendChild(d);
            i.value = '';
        }

        // Widget Vreme
        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget-io.com/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fotbal Pro - Enciclopedie 2026</title>
    <style>
        :root { --fcsb-red: #DA2928; --fcsb-blue: #0046AE; --dinamo-red: #D00000; --dinamo-white: #ffffff; --accent: #DA2928; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: #050505; color: #fff; min-height: 100vh; overflow-y: auto; overflow-x: hidden; }

        /* NAVIGARE FIXA */
        #top-bar { position: sticky; top: 0; z-index: 2000; background: #000; border-bottom: 2px solid var(--accent); padding: 10px; transition: 0.5s; }
        .selector { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn-e { flex: 1; padding: 18px; border-radius: 14px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.4s; font-size: 15px; letter-spacing: 1px; }
        
        .fcsb-style { background: linear-gradient(45deg, #DA2928, #0046AE); color: #fff; box-shadow: 0 4px 15px rgba(218, 41, 40, 0.3); }
        .dinamo-style { background: linear-gradient(45deg, #D00000, #333); color: #fff; border: 1px solid #D00000; box-shadow: 0 4px 15px rgba(208, 0, 0, 0.2); }
        
        .active-team { transform: scale(1.05); outline: 3px solid #fff; box-shadow: 0 0 25px var(--accent); }

        #tabs { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0; scrollbar-width: none; }
        #tabs::-webkit-scrollbar { display: none; }
        .tab { white-space: nowrap; padding: 10px 22px; border-radius: 30px; background: #1a1a1a; color: #888; border: 1px solid #333; font-weight: 700; font-size: 13px; }
        .tab.active { background: #fff; color: #000; border-color: #fff; }

        /* CONTINUT */
        #content { padding: 20px; }
        .card { background: #111; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }

        h2 { font-size: 24px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .news-tag { background: var(--accent); padding: 3px 8px; border-radius: 5px; font-size: 10px; text-transform: uppercase; }
        
        .news-item { padding: 12px 0; border-bottom: 1px solid #222; }
        .news-title { font-weight: 700; font-size: 15px; color: #fff; display: block; }
        .news-time { font-size: 11px; color: #666; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: #1a1a1a; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--accent); }
        .stat-val { font-size: 22px; font-weight: 900; display: block; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; }

        .history-row { padding: 15px 0; border-bottom: 1px solid #222; }
        .h-scor { font-size: 18px; font-weight: 900; color: var(--accent); }
        .h-info { font-size: 13px; color: #bbb; }
        .h-marc { font-size: 12px; color: #00ffcc; font-style: italic; }
    </style>
</head>
<body class="theme-fcsb">

<div id="top-bar">
    <div class="selector">
        <button id="b-fcsb" class="btn-e fcsb-style active-team">FCSB (Steaua)</button>
        <button id="b-dinamo" class="btn-e dinamo-style">Dinamo</button>
    </div>
    <div id="tabs">
        <button class="tab active" data-t="news">Știri Recente</button>
        <button class="tab" data-t="bilant">Bilanț Derby</button>
        <button class="tab" data-t="lot">Lotul 2026</button>
        <button class="tab" data-t="istorie">Meciuri de Aur</button>
    </div>
</div>

<div id="content"></div>

<script>
const db = {
    "FCSB": {
        accent: "#DA2928",
        news: [
            { t: "Darius Olaru, ofertă record din Arabia", h: "Acum 2 ore", d: "Căpitanul ar putea pleca pentru 7 milioane de euro." },
            { t: "Târnovanu, cel mai bun portar al lunii Martie", h: "Azi dimineață", d: "Intervenții decisive în ultimele 3 etape." }
        ],
        bilant: { vic: 68, eg: 60, inf: 61, total: 189, golaveraj: "273 - 254" },
        lot: ["Șt. Târnovanu (P)", "S. Ngezana (F)", "J. Dawa (F)", "R. Radunovic (F)", "D. Olaru (M)", "A. Șut (M)", "D. Bîrligea (A)", "F. Tănase (A)"],
        curiozitate: "Steaua '86 este singura echipă din istoria CCE care nu a primit gol în finală (inclusiv la penalty-uri)."
    },
    "Dinamo": {
        accent: "#D00000",
        news: [
            { t: "Zeljko Kopic confirmă noi transferuri", h: "Acum 4 ore", d: "Dinamo caută un fundaș central în Brazilia." },
            { t: "Sold-out pentru următorul meci în Ștefan cel Mare", h: "Ieri", d: "Fanii au epuizat biletele în 3 ore." }
        ],
        bilant: { vic: 61, eg: 60, inf: 68, total: 189, golaveraj: "254 - 273" },
        lot: ["A. Golubovic (P)", "K. Boateng (F)", "J. Homawoo (F)", "R. Opruț (F)", "C. Cîrjan (M)", "E. Gnahore (M)", "D. Politic (A)", "A. Selmani (A)"],
        curiozitate: "Dinamo a fost prima echipă românească care a eliminat o deținătoare de trofeu CCE (Hamburg, 1983)."
    }
};

const meciuri = [
    { data: "15 Martie 2026", scor: "FCSB 2 - 1 Dinamo", comp: "Liga 1", marc: "Bîrligea '44, Olaru '78 / Selmani '12" },
    { data: "20 Octombrie 2024", scor: "Dinamo 0 - 2 FCSB", comp: "Liga 1", marc: "Bîrligea '26, Musi '90+3" },
    { data: "10 Mai 1997", scor: "Steaua 5 - 0 Dinamo", comp: "Divizia A", marc: "Militaru, Ciocoiu (2), Șerban, Baciu" },
    { data: "1 Decembrie 1990", scor: "Steaua 1 - 0 Dinamo", comp: "Divizia A", marc: "Dan Petrescu '65" },
    { data: "21 Noiembrie 1948", scor: "CSCA 0 - 1 Dinamo", comp: "Primul Meci", marc: "Marin Apostol '42" }
];

let curE = "FCSB";
let curT = "news";

function update() {
    const info = db[curE];
    const container = document.getElementById("content");
    document.documentElement.style.setProperty('--accent', info.accent);
    
    document.getElementById("b-fcsb").className = "btn-e fcsb-style" + (curE === "FCSB" ? " active-team" : "");
    document.getElementById("b-dinamo").className = "btn-e dinamo-style" + (curE === "Dinamo" ? " active-team" : "");

    let html = "";
    if (curT === "news") {
        html = `<h2><span class="news-tag">Live</span> Știri de Ultimă Oră</h2>`;
        info.news.forEach(n => {
            html += `<div class="card"><span class="news-time">${n.h}</span><span class="news-title">${n.t}</span><p style="font-size:13px; color:#aaa; margin:5px 0;">${n.d}</p></div>`;
        });
        html += `<div class="card" style="background:rgba(255,255,0,0.05)"><h3>💡 Știați că?</h3><p style="font-size:14px;">${info.curiozitate}</p></div>`;
    } 
    else if (curT === "bilant") {
        html = `<h2>Bilanț Complet (189 Meciuri)</h2>
                <div class="stat-grid">
                    <div class="stat-box"><span class="stat-val">${info.bilant.vic}</span><span class="stat-label">Victorii</span></div>
                    <div class="stat-box"><span class="stat-val">${info.bilant.eg}</span><span class="stat-label">Egaluri</span></div>
                    <div class="stat-box"><span class="stat-val">${info.bilant.inf}</span><span class="stat-label">Înfrângeri</span></div>
                    <div class="stat-box"><span class="stat-val">${info.bilant.golaveraj}</span><span class="stat-label">Golaveraj</span></div>
                </div>`;
    }
    else if (curT === "lot") {
        html = `<h2>Lot Oficial - Aprilie 2026</h2><div class="card"><div class="stat-grid">`;
        info.lot.forEach(j => html += `<div class="stat-box" style="padding:10px; font-size:13px;">${j}</div>`);
        html += `</div></div>`;
    }
    else if (curT === "istorie") {
        html = `<h2>Arhiva Rezultatelor</h2>`;
        meciuri.forEach(m => {
            html += `<div class="card">
                        <div class="h-info">${m.data} | ${m.comp}</div>
                        <div class="h-scor">${m.scor}</div>
                        <div class="h-marc">⚽ ${m.marc}</div>
                    </div>`;
        });
    }

    container.innerHTML = html;
}

document.getElementById("b-fcsb").onclick = () => { curE = "FCSB"; update(); };
document.getElementById("b-dinamo").onclick = () => { curE = "Dinamo"; update(); };

document.querySelectorAll(".tab").forEach(btn => {
    btn.onclick = (e) => {
        document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
        e.target.classList.add("active");
        curT = e.target.dataset.t;
        update();
    };
});

update();
</script>
</body>
</html>

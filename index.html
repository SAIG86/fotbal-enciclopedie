<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enciclopedie Fotbal România v3.0</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #fff; line-height: 1.5; overflow-x: hidden; }
        
        /* Meniu Fix Sus */
        #header-fixed { position: sticky; top: 0; z-index: 1000; background: #000; border-bottom: 2px solid #333; }
        #sidebar { display: flex; padding: 10px; gap: 8px; }
        .team-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .fcsb-btn { background: linear-gradient(45deg, #DA2928, #0046AE); color: white; }
        .dinamo-btn { background: linear-gradient(45deg, #8B0000, #222); color: white; border: 1px solid #D00000; }
        .team-btn.active { outline: 3px solid #fff; box-shadow: 0 0 15px rgba(255,255,255,0.4); }

        /* Meniu Tab-uri Orizontal */
        #tabs { display: flex; overflow-x: auto; gap: 8px; padding: 10px; background: rgba(20,20,20,0.95); backdrop-filter: blur(5px); }
        #tabs::-webkit-scrollbar { display: none; }
        .tab-btn { white-space: nowrap; padding: 10px 18px; border-radius: 20px; border: 1px solid #444; background: #222; color: #fff; font-size: 13px; font-weight: 600; }
        .tab-btn.active { background: #fff; color: #000; font-weight: 800; }

        /* Continut Scrollabil */
        #content { padding: 20px; padding-bottom: 80px; }
        .card { background: rgba(255,255,255,0.06); border-radius: 15px; padding: 18px; margin-bottom: 15px; border-left: 5px solid #fff; }
        .theme-fcsb .card { border-left-color: #0046AE; }
        .theme-dinamo .card { border-left-color: #D00000; }

        .player-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .match-card { border-bottom: 1px solid #333; padding: 12px 0; }
        .match-title { font-weight: bold; color: #fff; display: flex; justify-content: space-between; }
        .match-details { font-size: 12px; color: #aaa; margin-top: 4px; }
        .match-scorers { font-size: 13px; color: #ffcc00; font-style: italic; margin-top: 4px; }
        
        h2 { font-size: 20px; margin-top: 5px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 8px; }
        h3 { color: #aaa; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body class="theme-fcsb">

<div id="header-fixed">
    <div id="sidebar">
        <button class="team-btn fcsb-btn active" data-team="FCSB">FCSB (Steaua)</button>
        <button class="team-btn dinamo-btn" data-team="Dinamo">Dinamo</button>
    </div>
    <div id="tabs">
        <button class="tab-btn active" data-tab="lot">Lot 2026</button>
        <button class="tab-btn" data-tab="derby-recent">Derby Recente (2020-26)</button>
        <button class="tab-btn" data-tab="derby-old">Arhiva Istorică (1948-90)</button>
        <button class="tab-btn" data-tab="palmares">Palmares Complet</button>
    </div>
</div>

<div id="content"></div>

<script>
const teamData = {
    "FCSB": {
        lot: {
            "Portari": ["Ștefan Târnovanu", "Răzvan Udrea", "Mihai Toma"],
            "Fundași": ["Siyabonga Ngezana", "Joyskim Dawa", "Mihai Popescu", "Risto Radunovic", "Valentin Crețu", "Ionuț Panțîru"],
            "Mijlocași": ["Darius Olaru (C)", "Adrian Șut", "Mihai Lixandru", "Malcom Edjouma", "Baba Alhassan", "Marius Ștefănescu"],
            "Atacanți": ["Daniel Bîrligea", "Florin Tănase", "David Miculescu", "Alexandru Băluță", "Daniel Popa"]
        },
        palmares: ["27 Titluri de Campioană (Record)", "24 Cupe ale României", "6 Supercupe", "2 Cupe ale Ligii", "Cupa Campionilor Europeni (1986)", "Supercupa Europei (1986)"]
    },
    "Dinamo": {
        lot: {
            "Portari": ["Adnan Golubovic", "Alexandru Roșca"],
            "Fundași": ["Kennedy Boateng", "Josué Homawoo", "Raul Opruț", "Maxime Sivis", "Răzvan Patriche", "Cristian Costin"],
            "Mijlocași": ["Eddy Gnahoré", "Cătălin Cîrjan", "Georgi Milanov", "Patrick Olsen", "Ahmed Bani"],
            "Atacanți": ["Astrit Selmani", "Hakim Abdallah", "Dennis Politic (C)", "Alberto Soro"]
        },
        palmares: ["18 Titluri de Campioană", "13 Cupe ale României", "2 Supercupe", "1 Cupă a Ligii", "Semifinală CCE (1984)", "Semifinală Cupa Cupelor (1990)"]
    }
};

const recentMatches = [
    { data: "15 Martie 2026", scor: "FCSB 2 - 1 Dinamo", comp: "Liga 1", scorers: "Bîrligea 44', Olaru 78' / Selmani 12'" },
    { data: "20 Octombrie 2024", scor: "Dinamo 0 - 2 FCSB", comp: "Liga 1", scorers: "Bîrligea 26', Musi 90+3'" },
    { data: "30 Octombrie 2024", scor: "Dinamo 0 - 4 FCSB", comp: "Cupa României", scorers: "Băluță 56', Phelipe 70', Ștefănescu 81', 88'" },
    { data: "22 Iulie 2023", scor: "FCSB 2 - 1 Dinamo", comp: "Liga 1", scorers: "Coman 30', Olaru 35' / Goncalo 83'" }
];

const oldMatches = [
    { data: "9 Septembrie 1989", scor: "Steaua 0 - 3 Dinamo", comp: "Divizia A", scorers: "Mateuț 15', Timofte 36', Cezar Zamfir 84'" },
    { data: "4 Mai 1986", scor: "Steaua 1 - 2 Dinamo", comp: "Divizia A", scorers: "Bölöni / Radu II, Orac" },
    { data: "11 Aprilie 1982", scor: "Dinamo 1 - 1 Steaua", comp: "Divizia A", scorers: "Dudu Georgescu / Septimiu Câmpeanu" },
    { data: "1 Decembrie 1957", scor: "Steaua 0 - 1 Dinamo", comp: "Divizia A", scorers: "Szakacs" },
    { data: "21 Noiembrie 1948", scor: "CSCA 0 - 1 Dinamo", comp: "Primul Derby", scorers: "Marin Apostol" }
];

let currentTeam = "FCSB";
let currentTab = "lot";

function render() {
    const content = document.getElementById("content");
    document.body.className = "theme-" + currentTeam.toLowerCase();
    
    if (currentTab === "lot") {
        let html = `<h2>Lot Actualizat (Apr 2026)</h2>`;
        const lot = teamData[currentTeam].lot;
        for (let post in lot) {
            html += `<div class="card"><h3>${post}</h3>`;
            lot[post].forEach(p => html += `<div class="player-row"><span>${p}</span> <span>⚽</span></div>`);
            html += `</div>`;
        }
        content.innerHTML = html;
    } 
    else if (currentTab === "derby-recent") {
        let html = `<h2>Rezultate Recente (2020-2026)</h2><div class="card">`;
        recentMatches.forEach(m => {
            html += `<div class="match-card"><div class="match-title"><span>${m.scor}</span></div><div class="match-details">${m.data} | ${m.comp}</div><div class="match-scorers">Marcatori: ${m.scorers}</div></div>`;
        });
        html += `</div>`;
        content.innerHTML = html;
    }
    else if (currentTab === "derby-old") {
        let html = `<h2>Arhiva Istorică (1948-1990)</h2><div class="card">`;
        oldMatches.forEach(m => {
            html += `<div class="match-card"><div class="match-title"><span>${m.scor}</span></div><div class="match-details">${m.data} | ${m.comp}</div><div class="match-scorers">Marcatori: ${m.scorers}</div></div>`;
        });
        html += `</div>`;
        content.innerHTML = html;
    }
    else if (currentTab === "palmares") {
        let html = `<h2>Palmares Complet</h2><div class="card"><ul>`;
        teamData[currentTeam].palmares.forEach(p => html += `<li style="margin-bottom:10px;">${p}</li>`);
        html += `</ul></div>`;
        content.innerHTML = html;
    }
    window.scrollTo(0, 0);
}

document.querySelectorAll(".team-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".team-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTeam = btn.dataset.team;
        render();
    };
});

document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTab = btn.dataset.tab;
        render();
    };
});

render();
</script>
</body>
</html>

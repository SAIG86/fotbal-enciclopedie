<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ Eternul Derby — FCSB vs Dinamo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap');
  
  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --border: rgba(255,255,255,0.1);
    --text: #ffffff;
    --sub: #a1a1aa;
    --muted: #71717a;
    --fcsb-red: #DA2928;
    --fcsb-blue: #0046AE;
    --dinamo-red: #C8001A;
    --dinamo-white: #FFFFFF;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body { 
    font-family: 'Barlow Condensed', -apple-system, BlinkMacSystemFont, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    overflow-x: hidden;
    line-height: 1.5;
  }

  /* ───── HEADER ───── */
  #header {
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 16px;
    position: sticky; 
    top: 0; 
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  
  .logo {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.5px;
    text-transform: uppercase;
  }
  
  .date-badge {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  
  .team-switcher { 
    display: flex; 
    gap: 12px; 
    margin-bottom: 16px; 
  }
  
  .team-btn {
    flex: 1; 
    padding: 14px 8px; 
    border-radius: 10px; 
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; 
    font-size: 16px; 
    cursor: pointer; 
    letter-spacing: 1px;
    text-transform: uppercase; 
    transition: all .3s ease;
  }
  
  .fcsb-btn { 
    background: linear-gradient(135deg, var(--fcsb-red) 0%, var(--fcsb-blue) 100%); 
    color: #fff; 
  }
  
  .dinamo-btn { 
    background: #1a1a1a; 
    color: var(--dinamo-red); 
    border: 2px solid var(--dinamo-red); 
  }
  
  .fcsb-btn.active { 
    box-shadow: 0 0 30px rgba(218,41,40,0.5); 
    transform: scale(1.02); 
  }
  
  .dinamo-btn.active { 
    background: var(--dinamo-red); 
    color: #fff; 
    box-shadow: 0 0 30px rgba(200,0,26,0.5); 
    transform: scale(1.02); 
  }

  #tabs { 
    display: flex; 
    overflow-x: auto; 
    gap: 8px; 
    padding-bottom: 4px; 
    scrollbar-width: none; 
  }
  
  #tabs::-webkit-scrollbar { display: none; }
  
  .tab {
    white-space: nowrap; 
    padding: 10px 18px; 
    border-radius: 8px;
    background: #1a1a1a; 
    color: var(--muted); 
    border: 1px solid var(--border);
    font-weight: 700; 
    font-size: 13px; 
    cursor: pointer; 
    transition: all .25s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .tab.on { 
    color: #fff; 
    border-color: transparent; 
  }

  /* ───── CONTENT ───── */
  #content { 
    padding: 16px; 
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ───── CARDS ───── */
  .card {
    background: var(--card); 
    border-radius: 12px; 
    padding: 20px;
    margin-bottom: 16px; 
    border: 1px solid var(--border);
    transition: border-color 0.3s;
  }
  
  .card:hover {
    border-color: rgba(255,255,255,0.2);
  }
  
  .card-title { 
    font-size: 11px; 
    color: var(--muted); 
    text-transform: uppercase; 
    letter-spacing: 2px; 
    margin-bottom: 16px;
    font-weight: 700;
  }
  
  .section-title { 
    font-size: 24px; 
    font-weight: 900; 
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: -0.5px;
  }

  /* ───── TEAM HERO ───── */
  .team-hero {
    text-align: center;
    padding: 30px 20px;
    border-radius: 12px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  
  .team-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.15;
    z-index: 0;
  }
  
  .team-hero > * {
    position: relative;
    z-index: 1;
  }
  
  .team-name {
    font-size: 36px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  
  .team-info {
    font-size: 14px;
    color: var(--sub);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    margin-top: 12px;
  }

  /* ───── STATUS BANNER ───── */
  .status-banner {
    border-radius: 12px; 
    padding: 16px 20px; 
    margin-bottom: 16px;
    display: flex; 
    align-items: center; 
    gap: 16px;
    border-left: 4px solid;
  }
  
  .banner-icon { font-size: 36px; }
  
  .banner-text { flex: 1; }
  
  .banner-title {
    font-size: 18px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .banner-sub {
    font-size: 14px;
    color: var(--sub);
    margin-top: 4px;
  }
  
  .banner-note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.6;
  }

  /* ───── H2H SCOREBOARD ───── */
  .h2h-box {
    display: grid; 
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center; 
    gap: 8px; 
    text-align: center; 
    padding: 20px 0;
  }
  
  .h2h-score { 
    font-size: 48px; 
    font-weight: 900;
    letter-spacing: -2px;
  }
  
  .h2h-label { 
    font-size: 10px; 
    color: var(--muted); 
    text-transform: uppercase; 
    letter-spacing: 1px; 
    margin-top: 4px;
    font-weight: 700;
  }

  /* ───── PROGRESS BAR ───── */
  .bar-wrap { 
    height: 12px; 
    background: #1a1a1a; 
    border-radius: 6px; 
    overflow: hidden; 
    margin: 12px 0;
    display: flex;
  }
  
  .bar-fill { 
    height: 100%;
    transition: width 1s ease-out; 
  }
  
  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ───── STAT ROW ───── */
  .stat-row { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 12px 0; 
    border-bottom: 1px solid var(--border); 
  }
  
  .stat-row:last-child { border-bottom: none; }
  
  .stat-badge { 
    font-weight: 800; 
    font-size: 14px; 
    background: #1a1a1a; 
    padding: 6px 12px; 
    border-radius: 6px;
  }

  /* ───── MATCH CARD ───── */
  .match-card {
    background: #0d0d12; 
    border-radius: 10px; 
    padding: 16px;
    margin-bottom: 12px; 
    border-left: 4px solid;
  }
  
  .match-top { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 8px; 
  }
  
  .match-competition { 
    font-size: 10px; 
    color: var(--muted); 
    text-transform: uppercase; 
    letter-spacing: 1px;
    font-weight: 700;
  }
  
  .match-date { 
    font-size: 12px; 
    color: var(--sub); 
  }
  
  .match-score { 
    font-size: 20px; 
    font-weight: 900; 
    text-align: center; 
    margin: 8px 0;
    letter-spacing: -0.5px;
  }
  
  .match-note { 
    font-size: 12px; 
    color: var(--muted);
    text-align: center;
  }

  /* ───── PLAYER CARD ───── */
  .player-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
    gap: 12px; 
  }
  
  .player-card {
    background: #0d0d12; 
    border-radius: 10px; 
    padding: 16px;
    border-left: 4px solid;
    transition: transform 0.2s;
  }
  
  .player-card:hover {
    transform: translateX(4px);
  }
  
  .player-pos { 
    font-size: 10px; 
    color: var(--muted); 
    text-transform: uppercase; 
    letter-spacing: 1px;
    font-weight: 700;
  }
  
  .player-name { 
    font-size: 16px; 
    font-weight: 800; 
    margin-top: 4px;
  }
  
  .player-detail { 
    font-size: 13px; 
    color: var(--sub); 
    margin-top: 4px; 
  }
  
  .player-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    text-align: center;
  }
  
  .player-stat-value {
    font-size: 18px;
    font-weight: 900;
  }
  
  .player-stat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* ───── POSITION SECTION ───── */
  .position-section {
    margin-bottom: 24px;
  }
  
  .position-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .position-count {
    font-size: 11px;
    color: var(--muted);
  }

  /* ───── RECORD CARD ───── */
  .record-item { 
    display: flex; 
    gap: 16px; 
    padding: 16px 0; 
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  
  .record-item:last-child { border-bottom: none; }
  
  .record-emoji { 
    font-size: 28px; 
    flex-shrink: 0;
    width: 40px;
    text-align: center;
  }
  
  .record-title { 
    font-size: 14px; 
    font-weight: 700; 
    margin-bottom: 4px; 
  }
  
  .record-val { 
    font-size: 13px; 
    color: var(--sub);
    line-height: 1.5;
  }

  /* ───── PALMAROS ───── */
  .palmares-row { 
    display: flex; 
    align-items: center; 
    gap: 16px; 
    padding: 14px 0; 
    border-bottom: 1px solid var(--border); 
  }
  
  .palmares-row:last-child { border-bottom: none; }
  
  .palmares-count { 
    font-size: 32px; 
    font-weight: 900; 
    min-width: 50px;
    text-align: center;
  }
  
  .palmares-comp { 
    font-size: 15px; 
    font-weight: 700; 
  }
  
  .palmares-years { 
    font-size: 12px; 
    color: var(--muted);
    margin-top: 2px;
  }

  /* ───── TIMELINE ───── */
  .timeline { 
    position: relative; 
    padding-left: 24px; 
  }
  
  .timeline::before { 
    content: ''; 
    position: absolute; 
    left: 8px; 
    top: 0; 
    bottom: 0; 
    width: 2px; 
    background: var(--border); 
  }
  
  .tl-item { 
    position: relative; 
    margin-bottom: 20px; 
  }
  
  .tl-dot { 
    position: absolute; 
    left: -20px; 
    top: 4px; 
    width: 12px; 
    height: 12px; 
    border-radius: 50%; 
    border: 2px solid var(--bg); 
  }
  
  .tl-year { 
    font-size: 11px; 
    color: var(--muted); 
    text-transform: uppercase; 
    letter-spacing: 1px;
    font-weight: 700;
  }
  
  .tl-score { 
    font-size: 18px; 
    font-weight: 900; 
    margin: 4px 0;
  }
  
  .tl-detail { 
    font-size: 13px; 
    color: var(--sub); 
  }

  /* ───── STANDINGS ───── */
  .standings-table {
    width: 100%;
  }
  
  .standings-row {
    display: grid;
    grid-template-columns: 40px 1fr 50px 50px 50px 50px;
    gap: 8px;
    padding: 12px 8px;
    border-radius: 8px;
    align-items: center;
    font-size: 14px;
  }
  
  .standings-row.highlight {
    background: rgba(255,255,255,0.05);
  }
  
  .standings-pos {
    font-weight: 900;
    font-size: 16px;
  }
  
  .standings-team {
    font-weight: 700;
  }
  
  .standings-stat {
    text-align: center;
    color: var(--sub);
  }
  
  .standings-header {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ───── EUROPA INFO ───── */
  .europa-box {
    background: linear-gradient(135deg, rgba(0,51,153,0.2), rgba(255,204,0,0.1));
    border: 1px solid rgba(0,51,153,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  
  .europa-icon {
    font-size: 28px;
  }
  
  .europa-title {
    font-weight: 700;
    margin-bottom: 4px;
  }
  
  .europa-text {
    font-size: 14px;
    color: var(--sub);
  }

  /* ───── FOOTER ───── */
  #footer {
    border-top: 1px solid var(--border);
    padding: 40px 20px;
    text-align: center;
    margin-top: 40px;
  }
  
  .footer-title {
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 8px;
  }
  
  .footer-sub {
    font-size: 14px;
    color: var(--sub);
  }
  
  .footer-date {
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
  }

  /* ───── RESPONSIVE ───── */
  @media (max-width: 640px) {
    .h2h-score { font-size: 36px; }
    .team-name { font-size: 28px; }
    .section-title { font-size: 20px; }
    .player-grid { grid-template-columns: 1fr; }
    .standings-row { grid-template-columns: 30px 1fr 40px 40px; }
    .standings-row .standings-stat:nth-child(n+5) { display: none; }
  }
</style>
</head>

function renderLot(E) {

  let html = `<div class="section-title">👥 Lot ${d.name} — 2025/26</div>`;
  
  pozOrder.forEach(p => {
    const juc = d.lot.filter(j => j.poz === p);
    if (!juc.length) return;
    
    html += `
    <div class="position-section">
      <div class="position-title">
        ${pozLabels[p]}
        <span class="position-count">(${juc.length})</span>
      </div>
      <div class="player-grid">
        ${juc.map(j => `
          <div class="player-card" style="border-color:${d.color}">
            <div class="player-pos">#${j.nr} · ${j.poz}</div>
            <div class="player-name">${j.name}</div>
            <div class="player-detail">${j.nat} · ${j.varsta} ani</div>
            <div class="player-stats">
              <div>
                <div class="player-stat-value" style="color:${d.color}">${j.goluri}</div>
                <div class="player-stat-label">Goluri</div>
              </div>
              <div>
                <div class="player-stat-value" style="color:#3b82f6">${j.assist}</div>
                <div class="player-stat-label">Assisturi</div>
              </div>
              <div>
                <div class="player-stat-value" style="color:var(--sub)">${j.meciuri}</div>
                <div class="player-stat-label">Meciuri</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  });
  
  const topScorers = [...d.lot].filter(p => p.goluri > 0).sort((a,b) => b.goluri - a.goluri).slice(0, 5);
  html += `
  <div class="card">
    <div class="card-title">🎯 Top Marcatori ${d.name}</div>
    ${topScorers.map((p, i) => `
      <div class="stat-row">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;${i === 0 ? 'background:'+d.color+';color:#fff' : 'background:#1a1a1a;color:'+d.color}">${i+1}</div>
          <div>
            <div style="font-weight:700;">${p.name}</div>
            <div style="font-size:11px;color:var(--muted)">${p.poz} · #${p.nr}</div>
          </div>
        </div>
        <div style="font-size:24px;font-weight:900;color:${d.color}">${p.goluri}</div>
      </div>
    `).join('')}
  </div>`;
  
  return html;
}

function render() {
  const d = DATA[curE];
  
  document.getElementById('logo-accent').style.color = d.color;

  document.querySelectorAll('.tab').forEach(t => {
    const isActive = t.dataset.t === curT;
    t.style.background = isActive ? d.color : '#1a1a1a';
    t.style.color = isActive ? '#fff' : 'var(--muted)';
    t.classList.toggle('on', isActive);
  });

  document.getElementById('f-btn').className = 'team-btn fcsb-btn' + (curE === 'FCSB' ? ' active' : '');
  document.getElementById('d-btn').className = 'team-btn dinamo-btn' + (curE === 'Dinamo' ? ' active' : '');

  let html = '';
  if (curT === 'acasa')     html = renderAcasa(curE);
  if (curT === 'lot')       html = renderLot(curE);
  if (curT === 'calendar')  html = renderCalendar(curE);
  if (curT === 'bilant')    html = renderBilant();
  if (curT === 'recorduri') html = renderRecorduri();
  if (curT === 'palmares')  html = renderPalmares(curE);

  document.getElementById('content').innerHTML = html;
  window.scrollTo(0, 0);
}

document.getElementById('f-btn').onclick = () => { curE = 'FCSB'; render(); };
document.getElementById('d-btn').onclick = () => { curE = 'Dinamo'; render(); };
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = (e) => { curT = e.currentTarget.dataset.t; render(); };
});

render();

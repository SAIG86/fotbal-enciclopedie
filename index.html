<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternul Derby - Enciclopedie 2026</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Tranzitii de culoare pentru tot site-ul */
        :root { --main-color: #DA2928; --sec-color: #0046AE; }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #000; 
            color: #fff; 
            transition: background 0.5s;
            overflow-x: hidden;
        }

        /* HEADER DINAMIC */
        #top-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #111;
            padding: 10px;
            border-bottom: 3px solid var(--main-color);
        }

        .selector-echipe { display: flex; gap: 10px; margin-bottom: 10px; }
        
        .btn-echipa {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid transparent;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Stiluri specifice per echipa */
        .theme-fcsb { --main-color: #DA2928; --sec-color: #0046AE; }
        .theme-dinamo { --main-color: #D00000; --sec-color: #ffffff; }

        .fcsb-btn-style { background: #DA2928; color: white; border-bottom: 4px solid #0046AE; }
        .dinamo-btn-style { background: #ffffff; color: #D00000; border-bottom: 4px solid #D00000; }

        .active-fcsb { outline: 3px solid #fff; transform: scale(1.02); }
        .active-dinamo { outline: 3px solid #D00000; transform: scale(1.02); }

        /* TABS */
        #tabs-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 5px 0;
        }
        #tabs-container::-webkit-scrollbar { display: none; }

        .tab {
            white-space: nowrap;
            padding: 10px 20px;
            border-radius: 20px;
            background: #222;
            color: #eee;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #444;
        }
        .tab.active { background: var(--main-color); color: #fff; border-color: #fff; }

        /* CONTINUT */
        #content { padding: 15px; line-height: 1.6; }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--main-color);
        }

        .stat-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px 0; 
            border-bottom: 1px solid #222;
        }

        .meci-istoric {
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
        .meci-data { font-size: 11px; color: #888; text-transform: uppercase; }
        .meci-scor { font-size: 16px; font-weight: 800; margin: 4px 0; }
        .meci-detalii { font-size: 13px; color: var(--main-color); font-style: italic; }

        .badge-titlu { background: var(--main-color); padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body class="theme-fcsb" id="body-site">

<div id="top-nav">
    <div class="selector-echipe">
        <button id="btn-fcsb" class="btn-echipa fcsb-btn-style active-fcsb">FCSB (Steaua)</button>
        <button id="btn-dinamo" class="btn-echipa dinamo-btn-style">Dinamo</button>
    </div>
    <div id="tabs-container">
        <button class="tab active" data-t="bilant">Bilanț General</button>
        <button class="tab" data-t="lot">Lot Aprilie 2026</button>
        <button class="tab" data-t="meciuri">Meciuri Istorice</button>
        <button class="tab" data-t="palmares">Palmares</button>
    </div>
</div>

<div id="content"></div>

<script>
const store = {
    "FCSB": {
        palmares: [
            { t: "Campioană România", c: "27 (Record)" },
            { t: "Cupa României", c: "24" },
            { t: "Supercupa României", c: "7" },
            { t: "Cupa Campionilor Europeni", c: "1 (1986)" },
            { t: "Supercupa Europei", c: "1 (1987)" }
        ],
        lot: [
            { p: "Portar", n: "Ștefan Târnovanu" },
            { p: "Fundaș", n: "Siyabonga Ngezana" },
            { p: "Fundaș", n: "Joyskim Dawa" },
            { p: "Fundaș", n: "Risto Radunovic" },
            { p: "Mijlocaș", n: "Darius Olaru (C)" },
            { p: "Mijlocaș", n: "Adrian Șut" },
            { p: "Mijlocaș", n: "Mihai Lixandru" },
            { p: "Atacant", n: "Daniel Bîrligea" },
            { p: "Atacant", n: "Florin Tănase" },
            { p: "Atacant", n: "David Miculescu" }
        ],
        bilant: { v: 67, e: 60, i: 61, goluri: "271 - 253" }
    },
    "Dinamo": {
        palmares: [
            { t: "Campioană România", c: "18" },
            { t: "Cupa României", c: "13" },
            { t: "Supercupa României", c: "2" },
            { t: "Semifinală Cupa Campionilor", c: "1 (1984)" },
            { t: "Semifinală Cupa Cupelor", c: "1 (1990)" }
        ],
        lot: [
            { p: "Portar", n: "Adnan Golubovic" },
            { p: "Fundaș", n: "Kennedy Boateng" },
            { p: "Fundaș", n: "Josué Homawoo" },
            { p: "Fundaș", n: "Raul Opruț" },
            { p: "Mijlocaș", n: "Eddy Gnahoré" },
            { p: "Mijlocaș", n: "Cătălin Cîrjan" },
            { p: "Mijlocaș", n: "Patrick Olsen" },
            { p: "Atacant", n: "Astrit Selmani" },
            { p: "Atacant", n: "Dennis Politic (C)" },
            { p: "Atacant", n: "Hakim Abdallah" }
        ],
        bilant: { v: 61, e: 60, i: 67, goluri: "253 - 271" }
    }
};

const meciuriCelebre = [
    { d: "20 Octombrie 2024", s: "Dinamo 0 - 2 FCSB", c: "Liga 1", m: "Bîrligea 26', Musi 90+3'" },
    { d: "30 Octombrie 2024", s: "Dinamo 0 - 4 FCSB", c: "Cupa României", m: "Băluță, Phelipe, Ștefănescu (2)" },
    { d: "10 Mai 1997", s: "Steaua 5 - 0 Dinamo", c: "Divizia A", m: "Militaru, Ciocoiu (2), Șerban, Baciu" },
    { d: "1 Decembrie 1990", s: "Steaua 1 - 0 Dinamo", c: "Divizia A", m: "Dan Petrescu" },
    { d: "9 Septembrie 1989", s: "Steaua 0 - 3 Dinamo", c: "Divizia A", m: "Mateuț, Timofte, Cezar Zamfir" },
    { d: "21 Noiembrie 1948", s: "CSCA 0 - 1 Dinamo", c: "Primul Derby", m: "Marin Apostol" }
];

let echipaCurenta = "FCSB";
let tabCurent = "bilant";

function refreshUI() {
    const main = document.getElementById("body-site");
    const content = document.getElementById("content");
    const info = store[echipaCurenta];

    // Update Culori
    main.className = echipaCurenta === "FCSB" ? "theme-fcsb" : "theme-dinamo";
    document.getElementById("btn-fcsb").className = "btn-echipa fcsb-btn-style" + (echipaCurenta === "FCSB" ? " active-fcsb" : "");
    document.getElementById("btn-dinamo").className = "btn-echipa dinamo-btn-style" + (echipaCurenta === "Dinamo" ? " active-dinamo" : "");

    let html = "";

    if (tabCurent === "bilant") {
        html = `<div class="card"><h2>⚔️ Bilanț în Eternul Derby</h2>
                <div class="stat-row"><span>Victorii ${echipaCurenta}</span><span class="badge-titlu">${info.bilant.v}</span></div>
                <div class="stat-row"><span>Egaluri</span><span class="badge-titlu">${info.bilant.e}</span></div>
                <div class="stat-row"><span>Golaveraj</span><span>${info.bilant.goluri}</span></div>
                <p style="font-size:12px; margin-top:15px; opacity:0.7;">*Include toate competițiile oficiale (Campionat, Cupă, Supercupă, Cupa Ligii).</p></div>`;
    } 
    else if (tabCurent === "lot") {
        html = `<h2>🏃 Lot Jucători Aprilie 2026</h2>`;
        info.lot.forEach(j => {
            html += `<div class="card" style="padding:10px;"><div class="stat-row"><span>${j.n}</span><span style="opacity:0.6">${j.p}</span></div></div>`;
        });
    }
    else if (tabCurent === "meciuri") {
        html = `<h2>📅 Confruntări Istorice</h2><div class="card">`;
        meciuriCelebre.forEach(m => {
            html += `<div class="meci-istoric">
                        <div class="meci-data">${m.d} | ${m.c}</div>
                        <div class="meci-scor">${m.s}</div>
                        <div class="meci-detalii">⚽ ${m.m}</div>
                    </div>`;
        });
        html += `</div>`;
    }
    else if (tabCurent === "palmares") {
        html = `<h2>🏆 Palmares Oficial</h2>`;
        info.palmares.forEach(p => {
            html += `<div class="card"><div class="stat-row"><span>${p.t}</span><span class="badge-titlu">${p.c}</span></div></div>`;
        });
    }

    content.innerHTML = html;
}

// Event Listeners
document.getElementById("btn-fcsb").onclick = () => { echipaCurenta = "FCSB"; refreshUI(); };
document.getElementById("btn-dinamo").onclick = () => { echipaCurenta = "Dinamo"; refreshUI(); };

document.querySelectorAll(".tab").forEach(t => {
    t.onclick = (e) => {
        document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
        e.target.classList.add("active");
        tabCurent = e.target.dataset.t;
        refreshUI();
    };
});

// Initializare
refreshUI();
</script>
</body>
</html>

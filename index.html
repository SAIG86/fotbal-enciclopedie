<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enciclopedie Fotbal Pro - S25 Ultra</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #sidebar { background: #111; display: flex; justify-content: space-around; padding: 12px; border-bottom: 3px solid #333; gap: 10px; }
        .team-btn { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .fcsb-btn { background: linear-gradient(45deg, #DA2928, #0046AE); color: white; }
        .dinamo-btn { background: linear-gradient(45deg, #8B0000, #333); color: white; border: 1px solid #D00000; }
        .team-btn.active { transform: scale(1.02); outline: 3px solid #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        #main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .theme-fcsb { background: linear-gradient(180deg, #001a3d 0%, #000 100%); }
        .theme-dinamo { background: linear-gradient(180deg, #3d0000 0%, #000 100%); }

        #header { padding: 25px 20px; text-align: center; }
        #teamName { font-size: 32px; font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        #tabs { display: flex; overflow-x: auto; gap: 8px; padding: 10px 15px; background: rgba(0,0,0,0.6); position: sticky; top: 0; z-index: 10; scrollbar-width: none; }
        #tabs::-webkit-scrollbar { display: none; }
        .tab-btn { white-space: nowrap; padding: 12px 22px; border-radius: 25px; border: 1px solid #444; background: #222; color: #fff; font-weight: 600; font-size: 14px; }
        .tab-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 800; }

        #content { padding: 20px; line-height: 1.6; }
        .section-card { background: rgba(255,255,255,0.07); border-radius: 20px; padding: 20px; margin-bottom: 20px; border-top: 5px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .theme-fcsb .section-card { border-top-color: #0046AE; }
        .theme-dinamo .section-card { border-top-color: #D00000; }

        h2 { font-size: 22px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .lot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .player-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; font-size: 14px; border-left: 3px solid #555; }
        .derby-stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #444; }
        .score-pill { background: #fff; color: #000; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body class="theme-fcsb">

<div id="sidebar">
    <button class="team-btn fcsb-btn active" data-team="FCSB">FCSB</button>
    <button class="team-btn dinamo-btn" data-team="Dinamo">DINAMO</button>
</div>

<div id="main">
    <div id="header">
        <div id="teamName">FCSB</div>
        <div id="tagline">Cea mai titrată echipă din România</div>
    </div>

    <div id="tabs">
        <button class="tab-btn active" data-tab="history">Istorie</button>
        <button class="tab-btn" data-tab="lot">Lot Jucători</button>
        <button class="tab-btn" data-tab="derby">Eternul Derby</button>
        <button class="tab-btn" data-tab="palmares">Palmares</button>
    </div>

    <div id="content"></div>
</div>

<script>
const data = {
    "FCSB": {
        history: "Fondat în 1947. Singura echipă din Estul Europei care a câștigat CCE (1986) și Supercupa Europei. Are în palmares 27 de titluri de campioană, fiind liderul absolut al trofeelor în România.",
        lot: {
            "Portari": ["Târnovanu", "A. Vlad"],
            "Fundași": ["Radunovic", "Ngezana", "Dawa", "Crețu", "Chirilă"],
            "Mijlocași": ["Olaru (C)", "Șut", "Lixandru", "Edjouma"],
            "Atacanți": ["Florin Tănase", "Miculescu", "Băluță", "Popa"]
        },
        derby_stats: { victorie: 67, egal: 59, infrangere: 61, total: 187 }
    },
    "Dinamo": {
        history: "Fondat în 1948. Prima echipă românească în semifinalele CCE (1984). Un simbol al rezistenței și pasiunii, cu 18 titluri și 13 Cupe. Supranumit 'Câinii Roșii' datorită agresivității din teren a fraților Nunweiller.",
        lot: {
            "Portari": ["Adnan Golubovic", "Roșca"],
            "Fundași": ["Boateng", "Homawoo", "Opruț", "Sivis", "Licsandru"],
            "Mijlocași": ["Gnahore", "Milanov", "Cîrjan", "Olson"],
            "Atacanți": ["Selmani", "Abdallah", "Politic (C)", "Caragea"]
        },
        derby_stats: { victorie: 61, egal: 59, infrangere: 67, total: 187 }
    }
};

const derbyResults = [
    { competitiie: "Liga 1", data: "2024", scor: "FCSB 1-0 Dinamo", gazda: "FCSB" },
    { competitiie: "Cupa României", data: "2024", scor: "Dinamo 0-4 FCSB", gazda: "Dinamo" },
    { competitiie: "Liga 1", data: "2023", scor: "Dinamo 0-1 FCSB", gazda: "Dinamo" }
];

let currentTeam = "FCSB";
let currentTab = "history";

function render() {
    const team = data[currentTeam];
    const content = document.getElementById("content");
    document.getElementById("teamName").textContent = currentTeam === "FCSB" ? "FCSB (Steaua)" : "Dinamo București";
    document.getElementById("main").className = currentTeam === "FCSB" ? "theme-fcsb" : "theme-dinamo";

    if (currentTab === "history") {
        content.innerHTML = `<div class="section-card"><h2>📜 Istorie</h2><p>${team.history}</p></div>`;
    } 
    else if (currentTab === "lot") {
        let html = `<h2>🏃 Lot Actualizat 2026</h2>`;
        for (let post in team.lot) {
            html += `<div class="section-card"><h3>${post}</h3><div class="lot-grid">`;
            team.lot[post].forEach(p => { html += `<div class="player-item">${p}</div>`; });
            html += `</div></div>`;
        }
        content.innerHTML = html;
    }
    else if (currentTab === "derby") {
        content.innerHTML = `
            <div class="section-card">
                <h2>⚔️ Bilanț General</h2>
                <div class="derby-stat"><span>Victorii ${currentTeam}</span> <span class="score-pill">${team.derby_stats.victorie}</span></div>
                <div class="derby-stat"><span>Egaluri</span> <span class="score-pill">${team.derby_stats.egal}</span></div>
                <div class="derby-stat"><span>Meciuri Totale</span> <span class="score-pill">${team.derby_stats.total}</span></div>
            </div>
            <div class="section-card">
                <h2>📅 Ultimele Rezultate</h2>
                ${derbyResults.map(r => `<div class="derby-stat"><span>${r.data} - ${r.competitiie}</span> <b>${r.scor}</b></div>`).join('')}
            </div>`;
    }
    else if (currentTab === "palmares") {
        content.innerHTML = `<div class="section-card"><h2>🏆 Palmares</h2><p>Secțiunea de trofee detaliată...</p></div>`;
    }
}

document.querySelectorAll(".team-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".team-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTeam = btn.dataset.team;
        render();
    };
});

document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTab = btn.dataset.tab;
        render();
    };
});

render();
</script>
</body>
</html>

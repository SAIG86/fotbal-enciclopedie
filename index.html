<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derby FCSB vs Dinamo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b14;
  color:#fff;
}

header{
  padding:10px;
  position:sticky;
  top:0;
  background:#111;
  border-bottom:2px solid red;
}

.teams{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.fcsb{background:linear-gradient(45deg,#d00,#06c);}
.dinamo{border:2px solid #c00;color:#c00;}

.active{outline:2px solid #fff;}

.tabs{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.tab{
  padding:8px 12px;
  background:#222;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
}

.tab.active{
  background:red;
}

#content{padding:12px;}

.card{
  background:#151525;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.player{
  background:#0f0f20;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}

.news{
  border-left:3px solid orange;
  padding-left:8px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<header>
  <div class="teams">
    <div class="btn fcsb active" onclick="switchTeam('FCSB')">FCSB</div>
    <div class="btn dinamo" onclick="switchTeam('DINAMO')">DINAMO</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('home')">Acasă</div>
    <div class="tab" onclick="switchTab('lot')">Lot</div>
    <div class="tab" onclick="switchTab('news')">Știri</div>
  </div>
</header>

<div id="content"></div>

<script>

let team = "FCSB";
let tab = "home";

const DATA = {
  FCSB: {
    name:"FCSB",
    coach:"Elias Charalambous",
    stadium:"Arena Națională",

    lot:[
      "Ștefan Târnovanu (GK)",
      "Valentin Crețu",
      "Joyskim Dawa",
      "Siyabonga Ngezana",
      "Risto Radunovic",
      "Darius Olaru",
      "Adrian Șut",
      "Florinel Coman",
      "Octavian Popescu",
      "David Miculescu",
      "Daniel Bîrligea"
    ],

    news:[
      "FCSB luptă pentru revenirea în play-off sezonul viitor",
      "Olaru rămâne liderul echipei",
      "Interes din străinătate pentru Bîrligea"
    ]
  },

  DINAMO:{
    name:"Dinamo",
    coach:"Zeljko Kopic",
    stadium:"Arcul de Triumf",

    lot:[
      "Golubovic (GK)",
      "Lucas Alves",
      "Boateng",
      "Costin",
      "Țicu",
      "Cîrjan",
      "Ghezali",
      "Politic",
      "Dennis Politic",
      "Hakim Abdallah",
      "Daniel Popa"
    ],

    news:[
      "Dinamo stabil în play-off",
      "Clubul pregătește participarea europeană",
      "Tineri promovați în prima echipă"
    ]
  }
};

function render(){
  let d = DATA[team];
  let html = "";

  if(tab==="home"){
    html += `
      <div class="card">
        <h2>${d.name}</h2>
        <p>Antrenor: ${d.coach}</p>
        <p>Stadion: ${d.stadium}</p>
      </div>

      <div class="card">
        <h3>Derby H2H</h3>
        <p>FCSB 72 - 57 - 62 Dinamo</p>
      </div>
    `;
  }

  if(tab==="lot"){
    html += `<div class="card"><h3>Lot</h3>`;
    d.lot.forEach(p=>{
      html+=`<div class="player">${p}</div>`;
    });
    html+=`</div>`;
  }

  if(tab==="news"){
    html += `<div class="card"><h3>Știri</h3>`;
    d.news.forEach(n=>{
      html+=`<div class="news">${n}</div>`;
    });
    html+=`</div>`;
  }

  document.getElementById("content").innerHTML = html;
}

function switchTeam(t){
  team=t;
  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".btn")[t==="FCSB"?0:1].classList.add("active");
  render();
}

function switchTab(t){
  tab=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

render();

</script>

</body>
</html>
